<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <th:block th:replace="~{fragments/layout :: head(pageTitle='Link Expired')}"></th:block>
</head>
<body>
    <div th:replace="~{fragments/layout :: topbar(title='Link Expired', subtitle=null, initials='PS', backUrl=null)}"></div>
    <div class="wa-container text-center">
        <div class="wa-card p-4 mt-4">
            <h2 class="h4 mb-2">Oops!</h2>
            <p class="wa-muted" th:text="${error}">This link is invalid or expired.</p>
        </div>
    </div>
    <th:block th:replace="~{fragments/layout :: scripts}"></th:block>
</body>
</html>
