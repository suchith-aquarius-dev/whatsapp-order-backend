<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
    <title>Order Status</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
</head>
<body>
    <div class="container text-center my-5">
        <h2 class="display-4">Order #<span th:text="${order.id}">1</span></h2>
        <p class="lead" th:text="${statusMessage}">This order is already finalized.</p>
        <p class="lead">Current Status: <span th:text="${order.status}">PAID</span></p>

        <div class="card my-4">
            <div class="card-header">
                Order Items
            </div>
            <ul class="list-group list-group-flush">
                <li class="list-group-item d-flex justify-content-between align-items-center" th:each="item : ${order.items}">
                    <span th:text="${item.productName}">Product Name</span>
                    <span><span th:text="${item.quantity}">1</span> x ₹<span th:text="${item.price}">0</span></span>
                </li>
            </ul>
            <div class="card-footer">
                <strong>Total Amount: ₹<span th:text="${order.totalAmount}">0</span></strong>
            </div>
        </div>

        <a class="btn btn-success btn-lg mt-4" th:href="@{'https://wa.me/' + ${whatsappNumber}}">Back to WhatsApp</a>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous"></script>
</body>
</html>
