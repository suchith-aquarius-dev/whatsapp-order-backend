<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
    <title>Order Status</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background-color: #f8f9fa;
        }
        .alert-container {
            max-width: 500px;
            width: 100%;
        }
    </style>
</head>
<body>
    <div class="alert-container">
        <div th:classappend="${isSuccess} ? 'alert-success' : 'alert-danger'" class="alert text-center" role="alert">
            <p class="lead" th:text="${message}"></p>
            <button id="continueButton" class="btn btn-primary mt-3">Continue</button>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous"></script>
    <script th:inline="javascript">
        /*<![CDATA[*/
        const isSuccess = /*[[${isSuccess}]]*/ false;
        const whatsappNumber = /*[[${whatsappNumber}]]*/ '15551234567';
        const continueButton = document.getElementById('continueButton');
        const redirectUrl = 'https://wa.me/' + whatsappNumber;

        function redirectToWhatsApp() {
            window.location.href = redirectUrl;
        }

        if (isSuccess) {
            // Auto-redirect after a few seconds for success
            setTimeout(() => {
                redirectToWhatsApp();
            }, 5000); // 5 seconds
            continueButton.textContent = "Return to Chat";
        } else {
            // For failure, wait for user to click button
            continueButton.textContent = "Return to Chat";
        }

        continueButton.addEventListener('click', redirectToWhatsApp);
        /*]]>*/
    </script>
</body>
</html>
