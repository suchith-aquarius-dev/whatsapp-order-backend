<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <th:block th:replace="~{fragments/layout :: head(pageTitle=${product.id == null ? 'Add New Product' : 'Edit Product'})}"></th:block>
    <style>
        .existing-image-thumbnail {
            max-width: 100px;
            max-height: 100px;
            object-fit: cover;
            margin: 5px;
            border: 1px solid #ddd;
            padding: 2px;
        }
        .image-preview-container {
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            margin-top: 10px;
        }
        .image-preview-item {
            position: relative;
            margin-right: 10px;
            margin-bottom: 10px;
        }
        .remove-image-btn {
            position: absolute;
            top: -5px;
            right: -5px;
            background-color: red;
            color: white;
            border-radius: 50%;
            width: 20px;
            height: 20px;
            font-size: 0.75rem;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            border: none;
            line-height: 1;
        }
    </style>
</head>
<body>
    <div th:replace="~{fragments/layout :: topbar(title=${product.id == null ? 'Add New Product' : 'Edit Product'}, subtitle='Products', initials='AD', backUrl='/admin/products/list')}"></div>
    <div class="wa-container">

        <div th:if="${message}" class="alert alert-success" role="alert">
            <span th:text="${message}"></span>
        </div>
        <div th:if="${error}" class="alert alert-danger" role="alert">
            <span th:text="${error}"></span>
        </div>

        <form th:action="${product.id == null ? '/admin/products/add' : '/admin/products/edit'}" th:object="${product}" method="post" enctype="multipart/form-data">
            <input type="hidden" th:field="*{id}" th:if="${product.id != null}" />

            <div class="mb-3">
                <label for="name" class="form-label">Product Name</label>
                <input type="text" id="name" th:field="*{name}" class="form-control" required />
            </div>
            <div class="mb-3">
                <label for="description" class="form-label">Description</label>
                <textarea id="description" th:field="*{description}" class="form-control" rows="3" required></textarea>
            </div>
            <div class="mb-3">
                <label for="category" class="form-label">Category</label>
                <input type="text" id="category" th:field="*{category}" class="form-control" required />
            </div>

            <h4 class="mt-4 mb-3">Product Variants</h4>
            <div id="variantsContainer">
                <div class="card mb-2 variant-item" th:each="variant, stat : *{variants}">
                    <div class="card-body">
                        <input type="hidden" th:name="${'variants[' + stat.index + '].id'}" th:value="${variant.id}" />
                        <div class="row g-2">
                            <div class="col-md-4">
                                <label class="form-label">Variant Name</label>
                                <input type="text" th:name="${'variants[' + stat.index + '].name'}" th:value="${variant.name}" class="form-control" placeholder="e.g., Single, Pack of 6" required />
                            </div>
                            <div class="col-md-4">
                                <label class="form-label">Quantity Value</label>
                                <input type="number" th:name="${'variants[' + stat.index + '].quantityValue'}" th:value="${variant.quantityValue}" class="form-control" min="1" required />
                            </div>
                            <div class="col-md-3">
                                <label class="form-label">Price</label>
                                <input type="number" th:name="${'variants[' + stat.index + '].price'}" th:value="${variant.price}" class="form-control" step="0.01" required />
                            </div>
                            <div class="col-md-1 d-flex align-items-end">
                                <button type="button" class="btn btn-danger remove-variant-btn w-100">X</button>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
            <button type="button" id="addVariantBtn" class="btn btn-info btn-sm mt-2">Add Variant</button>

            <div class="mb-3 mt-4">
                <label class="form-label">Existing Images</label>
                <div class="image-preview-container" th:if="${product.id != null and !#lists.isEmpty(product.imageFilenames)}">
                    <div class="image-preview-item" th:each="imageFilename : ${product.imageFilenames}">
                        <img th:src="@{/admin/products/images/{filename}(filename=${imageFilename})}" class="existing-image-thumbnail" alt="Product Image" />
                        <button type="button" class="remove-image-btn" th:data-filename="${imageFilename}">&times;</button>
                        <input type="hidden" th:name="existingImageFilenames" th:value="${imageFilename}" />
                    </div>
                </div>
                <div th:if="${product.id != null and #lists.isEmpty(product.imageFilenames)}" class="text-muted">No existing images.</div>
            </div>

            <div class="mb-3">
                <label for="imageFiles" class="form-label">Upload New Images</label>
                <input type="file" id="imageFiles" name="imageFiles" class="form-control" multiple />
            </div>
            <button type="submit" class="btn btn-primary">Save Product</button>
            <a th:href="@{/admin/products/list}" class="btn btn-secondary ms-2">Cancel</a>
        </form>
    </div>

    <th:block th:replace="~{fragments/layout :: scripts}"></th:block>
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const variantsContainer = document.getElementById('variantsContainer');
            const addVariantBtn = document.getElementById('addVariantBtn');
            let variantIndex = variantsContainer.children.length;

            function addVariantField(variant = {id: '', name: '', quantityValue: 1, price: 0.00}) {
                const newVariantHtml = `
                    <div class="card mb-2 variant-item">
                        <div class="card-body">
                            <input type="hidden" name="variants[${variantIndex}].id" value="${variant.id}" />
                            <div class="row g-2">
                                <div class="col-md-4">
                                    <label class="form-label">Variant Name</label>
                                    <input type="text" name="variants[${variantIndex}].name" value="${variant.name}" class="form-control" placeholder="e.g., Single, Pack of 6" required />
                                </div>
                                <div class="col-md-4">
                                    <label class="form-label">Quantity Value</label>
                                    <input type="number" name="variants[${variantIndex}].quantityValue" value="${variant.quantityValue}" class="form-control" min="1" required />
                                </div>
                                <div class="col-md-3">
                                    <label class="form-label">Price</label>
                                    <input type="number" name="variants[${variantIndex}].price" value="${variant.price}" class="form-control" step="0.01" required />
                                </div>
                                <div class="col-md-1 d-flex align-items-end">
                                    <button type="button" class="btn btn-danger remove-variant-btn w-100">X</button>
                                </div>
                            </div>
                        </div>
                    </div>
                `;
                variantsContainer.insertAdjacentHTML('beforeend', newVariantHtml);
                variantIndex++;
                updateRemoveButtons();
            }

            function updateRemoveButtons() {
                document.querySelectorAll('.remove-variant-btn').forEach(button => {
                    button.onclick = function() {
                        this.closest('.variant-item').remove();
                        reindexVariants();
                    };
                });
            }

            function reindexVariants() {
                document.querySelectorAll('#variantsContainer .variant-item').forEach((item, index) => {
                    item.querySelectorAll('input, select, textarea').forEach(input => {
                        const name = input.getAttribute('name');
                        if (name) {
                            input.setAttribute('name', name.replace(/variants\[\d+\]/, `variants[${index}]`));
                        }
                    });
                });
                variantIndex = variantsContainer.children.length; // Update the global index
            }

            addVariantBtn.addEventListener('click', () => addVariantField());
            updateRemoveButtons(); // Attach handlers to existing buttons on load

            // Add one variant field by default if none exist and it's a new product
            if (variantIndex === 0 && /*[[${product.id == null}]]*/ true) {
                addVariantField();
            }

            // Image removal logic
            document.querySelectorAll('.remove-image-btn').forEach(button => {
                button.addEventListener('click', function() {
                    const item = this.closest('.image-preview-item');
                    const filename = this.dataset.filename;
                    // Instead of directly removing, mark for deletion or filter on server
                    // For now, we'll just remove it from the DOM and rely on the server
                    // to only save existingImageFilenames that are still present.
                    item.remove();
                    // You might want to add a hidden input here to explicitly tell the server
                    // which images were removed, if not sending all remaining filenames.
                });
            });
        });
    </script>
</body>
</html>
