<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
    <title>Order Received</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
</head>
<body>
    <div class="container text-center my-5">
        <h2 class="display-4">Thanks, your order is in!</h2>
        <p class="lead">Order #<span th:text="${order.id}">1</span> — total ₹<span th:text="${order.totalAmount}">0</span></p>
        <p class="lead">We've sent a payment link to your WhatsApp. Head back to the chat to complete payment.</p>

        <!-- wa.me link just reopens the chat thread for convenience; the actual
             Pay Now message was already pushed server-side via the Cloud API -->
        <a class="btn btn-success btn-lg mt-4" th:href="@{'https://wa.me/' + ${phoneNumberId}}">Back to WhatsApp</a>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous"></script>
</body>
</html>
