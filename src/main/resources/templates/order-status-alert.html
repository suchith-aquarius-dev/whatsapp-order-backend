<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <th:block th:replace="~{fragments/layout :: head(pageTitle='Order Status')}"></th:block>
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .alert-container {
            max-width: 420px;
            width: 100%;
            padding: 0 16px;
        }
    </style>
</head>
<body>
    <div class="alert-container">
        <div th:classappend="${isSuccess} ? 'alert-success' : 'alert-danger'" class="alert text-center wa-card" role="alert">
            <p class="lead" th:text="${message}"></p>
            <button id="continueButton" class="btn btn-success mt-2">Continue</button>
        </div>
    </div>

    <th:block th:replace="~{fragments/layout :: scripts}"></th:block>
    <script th:inline="javascript">
        /*<![CDATA[*/
        const isSuccess = /*[[${isSuccess}]]*/ false;
        const whatsappNumber = /*[[${whatsappNumber}]]*/ '15551234567';
        const continueButton = document.getElementById('continueButton');
        const redirectUrl = 'https://wa.me/' + whatsappNumber;

        function redirectToWhatsApp() {
            window.location.href = redirectUrl;
        }

        if (isSuccess) {
            setTimeout(() => { redirectToWhatsApp(); }, 5000);
            continueButton.textContent = "Return to Chat";
        } else {
            continueButton.textContent = "Return to Chat";
        }

        continueButton.addEventListener('click', redirectToWhatsApp);
        /*]]>*/
    </script>
</body>
</html>
