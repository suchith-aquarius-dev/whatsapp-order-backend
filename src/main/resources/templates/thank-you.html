<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <th:block th:replace="~{fragments/layout :: head(pageTitle='Order Received')}"></th:block>
</head>
<body>
    <div th:replace="~{fragments/layout :: topbar(title='Order Received', subtitle=null, initials='PS', backUrl=null)}"></div>
    <div class="wa-container text-center">
        <div class="wa-card p-4 mt-4">
            <h2 class="h4 mb-3">Thanks, your order is in! 🎉</h2>
            <p class="mb-1">Order #<span th:text="${order.id}">1</span> — total ₹<span th:text="${order.totalAmount}">0</span></p>
            <p class="wa-muted">We've sent a payment link to your WhatsApp. Head back to the chat to complete payment.</p>

            <!-- wa.me link just reopens the chat thread for convenience; the actual
                 Pay Now message was already pushed server-side via the Cloud API -->
            <a class="btn btn-success btn-lg mt-3" th:href="@{'https://wa.me/' + ${phoneNumberId}}">Back to WhatsApp</a>
        </div>
    </div>
    <th:block th:replace="~{fragments/layout :: scripts}"></th:block>
</body>
</html>
