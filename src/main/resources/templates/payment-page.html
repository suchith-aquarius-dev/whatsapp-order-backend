<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <th:block th:replace="~{fragments/layout :: head(pageTitle='Complete Your Payment')}"></th:block>
</head>
<body>
    <div th:replace="~{fragments/layout :: topbar(title=${'Order #' + order.id}, subtitle='Complete your payment', initials='PS', backUrl=null)}"></div>
    <div class="wa-container text-center">
        <div class="wa-card p-4 mt-3">
            <p class="lead mb-1">Total Amount: ₹<span th:text="${order.totalAmount}">0</span></p>
            <p class="wa-muted">Current Status: <span th:text="${order.status}">PAYMENT_LINK_SENT</span></p>
            <p th:if="${order.deliveryDate != null}" class="wa-muted">
                Delivery: <strong th:text="${#temporals.format(order.deliveryDate, 'dd MMM yyyy')}">01 Jan 2026</strong>
                <span th:if="${order.deliveryTime != null}">
                    at <strong th:text="${#temporals.format(order.deliveryTime, 'hh:mm a')}">10:00 AM</strong>
                </span>
            </p>

            <div th:if="${isOrderFinalized}" class="alert alert-info mt-3" role="alert">
                <p class="mb-0" th:text="${statusMessage}">This order has already been finalized.</p>
            </div>

            <div th:unless="${isOrderFinalized}" class="d-flex justify-content-center gap-2 mt-4">
                <form th:action="@{/pay/{orderId}/success(orderId=${order.id})}" method="post">
                    <button type="submit" class="btn btn-success btn-lg">Make Payment</button>
                </form>
                <form th:action="@{/pay/{orderId}/cancel(orderId=${order.id})}" method="post">
                    <button type="submit" class="btn btn-danger btn-lg">Cancel Order</button>
                </form>
            </div>
        </div>
    </div>
    <th:block th:replace="~{fragments/layout :: scripts}"></th:block>
</body>
</html>
