<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head><title>Fragments (not rendered directly)</title></head>
<body>

<!--
  HEAD fragment - insert INSIDE your page's own single <head> tag:
    <head>
        <th:block th:replace="~{fragments/layout :: head(pageTitle='Place Your Order')}"></th:block>
        <!-- any page-specific <style> can go here, after this include -->
    </head>
-->
<th:block th:fragment="head(pageTitle)">
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no"/>
    <title th:text="${pageTitle} + ' | Pastry Shop'">Pastry Shop</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet"
          integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
          crossorigin="anonymous"/>
    <link th:href="@{/css/whatsapp-theme.css}" rel="stylesheet"/>
</th:block>

<!--
  TOP APP BAR fragment
  Usage:
    <div th:replace="~{fragments/layout :: topbar(
            title='Order Now',
            subtitle='Sweet Treats Bakery',
            initials='ST',
            backUrl=null)}"></div>

  Pass backUrl as a real URL string to show a back arrow (e.g. for admin
  pages that navigate between list/add/edit). Pass null to hide it
  (typically for the customer-facing entry pages reached from WhatsApp).
-->
<div th:fragment="topbar(title, subtitle, initials, backUrl)" class="wa-topbar">
    <a th:if="${backUrl != null}" th:href="@{${backUrl}}" class="wa-back">&#8592;</a>
    <div class="wa-avatar" th:text="${initials}">SB</div>
    <div>
        <p class="wa-title" th:text="${title}">Page Title</p>
        <p class="wa-subtitle" th:if="${subtitle != null}" th:text="${subtitle}">Subtitle</p>
    </div>
</div>

<!--
  SCRIPTS fragment - common bottom-of-body script includes
  Usage:
    <th:block th:replace="~{fragments/layout :: scripts}"></th:block>
-->
<th:block th:fragment="scripts">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
            integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz"
            crossorigin="anonymous"></script>
</th:block>

</body>
</html>
