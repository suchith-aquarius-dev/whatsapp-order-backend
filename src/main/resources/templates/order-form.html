<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
    <title>Place Your Order</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
</head>
<body>
    <div class="container">
        <h2 class="my-4">Place Your Order</h2>

        <form th:action="@{/order}" th:object="${orderForm}" method="post">
            <input type="hidden" th:field="*{token}" />

            <div class="mb-3">
                <label for="customerName" class="form-label">Your Name</label>
                <input type="text" id="customerName" th:field="*{customerName}" class="form-control" placeholder="Enter your name" required />
            </div>

            <div class="card mb-3" th:each="product : ${products}">
                <div class="card-body d-flex justify-content-between align-items-center">
                    <div class="form-check">
                        <input class="form-check-input" type="checkbox" name="productIds" th:value="${product.id}" th:id="${'product-' + product.id}" />
                        <label class="form-check-label" th:for="${'product-' + product.id}">
                            <span th:text="${product.name}">Product name</span>
                            — ₹<span th:text="${product.price}">0</span>
                        </label>
                    </div>
                    <input type="number" name="quantities" value="1" min="1" class="form-control w-auto" style="max-width: 80px;" />
                </div>
            </div>

            <button type="submit" class="btn btn-success w-100 py-3 mt-4">Submit Order</button>
        </form>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous"></script>
</body>
</html>
