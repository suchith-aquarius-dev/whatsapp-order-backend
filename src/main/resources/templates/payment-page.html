<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
    <title>Complete Your Payment</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
</head>
<body>
    <div class="container text-center my-5">
        <h2 class="display-4">Order #<span th:text="${order.id}">1</span></h2>
        <p class="lead">Total Amount: ₹<span th:text="${order.totalAmount}">0</span></p>
        <p class="lead">Current Status: <span th:text="${order.status}">PAYMENT_LINK_SENT</span></p>

        <div th:if="${isOrderFinalized}" class="alert alert-info mt-4" role="alert">
            <p class="mb-0" th:text="${statusMessage}">This order has already been finalized.</p>
        </div>

        <div th:unless="${isOrderFinalized}" class="d-flex justify-content-center mt-4"> <!-- Added d-flex and justify-content-center -->
            <form th:action="@{/pay/{orderId}/success(orderId=${order.id})}" method="post" class="me-3"> <!-- Added me-3 for spacing -->
                <button type="submit" class="btn btn-success btn-lg">Make Payment Success</button>
            </form>
            <form th:action="@{/pay/{orderId}/cancel(orderId=${order.id})}" method="post">
                <button type="submit" class="btn btn-danger btn-lg">Cancel Order</button>
            </form>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous"></script>
</body>
</html>
