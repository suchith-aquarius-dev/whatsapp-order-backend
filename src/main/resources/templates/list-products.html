<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <th:block th:replace="~{fragments/layout :: head(pageTitle='Products')}"></th:block>
    <style>
        .product-img {
            max-width: 100px;
            max-height: 100px;
            object-fit: cover;
        }
    </style>
</head>
<body>
    <div th:replace="~{fragments/layout :: topbar(title='Products', subtitle='Manage your menu', initials='AD', backUrl=null)}"></div>
    <div class="wa-container wa-wide">
        <div class="d-flex justify-content-between align-items-center my-3">
            <h2 class="h4 mb-0">Product List</h2>
        </div>

        <div th:if="${message}" class="alert alert-success" role="alert">
            <span th:text="${message}"></span>
        </div>
        <div th:if="${error}" class="alert alert-danger" role="alert">
            <span th:text="${error}"></span>
        </div>

        <a th:href="@{/admin/products/add}" class="btn btn-primary mb-3">Add New Product</a>

        <table class="table table-striped">
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Name</th>
                    <th>Description</th>
                    <th>Category</th>
                    <th>Variants</th>
                    <th>Images</th>
                    <th>Actions</th> <!-- New column for actions -->
                </tr>
            </thead>
            <tbody>
                <tr th:each="product : ${products}">
                    <td th:text="${product.id}">1</td>
                    <td th:text="${product.name}">Product Name</td>
                    <td th:text="${product.description}">Description</td>
                    <td th:text="${product.category}">Category</td>
                    <td>
                        <ul class="list-unstyled mb-0">
                            <li th:each="variant : ${product.variants}">
                                <span th:text="${variant.name}">Variant Name</span>: ₹<span th:text="${variant.price}">0.00</span> (<span th:text="${variant.quantityValue}">1</span> item<span th:if="${variant.quantityValue > 1}">s</span>)
                            </li>
                        </ul>
                        <div th:if="${#lists.isEmpty(product.variants)}">No variants defined</div>
                    </td>
                    <td>
                        <div th:if="${#lists.isEmpty(product.imageFilenames)}">No Images</div>
                        <div th:unless="${#lists.isEmpty(product.imageFilenames)}">
                            <img th:each="imageFilename : ${product.imageFilenames}"
                                 th:src="@{/admin/products/images/{filename}(filename=${imageFilename})}"
                                 class="img-thumbnail product-img me-2" alt="Product Image" />
                        </div>
                    </td>
                    <td>
                        <a th:href="@{/admin/products/edit/{id}(id=${product.id})}" class="btn btn-sm btn-warning me-2">Edit</a>
                        <form th:action="@{/admin/products/delete/{id}(id=${product.id})}" method="post" style="display:inline;" onsubmit="return confirm('Are you sure you want to delete this product?');">
                            <button type="submit" class="btn btn-sm btn-danger">Delete</button>
                        </form>
                    </td>
                </tr>
            </tbody>
        </table>
    </div>

    <th:block th:replace="~{fragments/layout :: scripts}"></th:block>
</body>
</html>
