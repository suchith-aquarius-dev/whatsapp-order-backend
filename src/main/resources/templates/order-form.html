<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Place Your Order</title>
    <style>
        body { font-family: Arial, sans-serif; max-width: 480px; margin: 40px auto; padding: 0 16px; }
        .product { display: flex; justify-content: space-between; align-items: center; padding: 12px 0; border-bottom: 1px solid #eee; }
        .product label { flex: 1; }
        input[type=number] { width: 60px; }
        button { width: 100%; padding: 14px; background: #25D366; color: white; border: none; border-radius: 6px; font-size: 16px; margin-top: 20px; }
        input[type=text] { width: 100%; padding: 10px; margin: 8px 0 16px; box-sizing: border-box; }
    </style>
</head>
<body>
    <h2>Place Your Order</h2>

    <form th:action="@{/order}" th:object="${orderForm}" method="post">
        <input type="hidden" th:field="*{token}" />

        <label for="customerName">Your Name</label>
        <input type="text" id="customerName" th:field="*{customerName}" placeholder="Enter your name" required />

        <div th:each="product : ${products}" class="product">
            <label>
                <input type="checkbox" name="productIds" th:value="${product.id}" />
                <span th:text="${product.name}">Product name</span>
                — ₹<span th:text="${product.price}">0</span>
            </label>
            <input type="number" name="quantities" value="1" min="1" />
        </div>

        <button type="submit">Submit Order</button>
    </form>
</body>
</html>
