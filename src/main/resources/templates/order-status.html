<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <th:block th:replace="~{fragments/layout :: head(pageTitle='Order Status')}"></th:block>
</head>
<body>
    <div th:replace="~{fragments/layout :: topbar(title=${'Order #' + order.id}, subtitle=${order.status}, initials='PS', backUrl=null)}"></div>
    <div class="wa-container text-center">
        <p class="lead mt-3" th:text="${statusMessage}">This order is already finalized.</p>

        <p th:if="${order.deliveryDate != null}" class="wa-muted mb-3">
            Delivery: <strong th:text="${#temporals.format(order.deliveryDate, 'dd MMM yyyy')}">01 Jan 2026</strong>
            <span th:if="${order.deliveryTime != null}">
                at <strong th:text="${#temporals.format(order.deliveryTime, 'hh:mm a')}">10:00 AM</strong>
            </span>
        </p>

        <div class="card my-4 text-start">
            <div class="card-header">Order Items</div>
            <ul class="list-group list-group-flush">
                <li class="list-group-item d-flex justify-content-between align-items-center" th:each="item : ${order.items}">
                    <span th:text="${item.productName}">Product Name</span>
                    <span><span th:text="${item.quantity}">1</span> x ₹<span th:text="${item.price}">0</span></span>
                </li>
            </ul>
            <div class="card-footer">
                <strong>Total Amount: ₹<span th:text="${order.totalAmount}">0</span></strong>
            </div>
        </div>

        <a class="btn btn-success btn-lg mt-2" th:href="@{'https://wa.me/' + ${whatsappNumber}}">Back to WhatsApp</a>
    </div>
    <th:block th:replace="~{fragments/layout :: scripts}"></th:block>
</body>
</html>
